name: WorkHub CI/CD

on:
  push:
    branches: [ main, bassam-learning ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Build with Maven
        run: mvn -B package --file pom.xml
        
      - name: Run Unit Tests
        run: mvn test
        
      - name: Docker Build (Simulation)
        run: |
          docker build -t workhub-saas:${{ github.sha }} .
          echo "Docker image built successfully"
          
      - name: Infrastructure Linting (Simulation)
        run: |
          echo "Verifying Docker Compose configuration..."
          docker-compose config -q
          
          echo "Verifying Kubernetes manifests (Client-side)..."
          # Use --validate=false to skip server-side schema check in the runner
          kubectl apply --dry-run=client --validate=false -f k8s/
