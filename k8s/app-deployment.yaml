apiVersion: apps/v1
kind: Deployment
metadata:
  name: workhub-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: workhub-app
  template:
    metadata:
      labels:
        app: workhub-app
    spec:
      containers:
        - name: workhub-app
          image: workhub-saas:latest
          imagePullPolicy: Never # For local minikube/docker-desktop testing
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
            - name: WORKHUB_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: workhub-service
spec:
  type: LoadBalancer
  selector:
    app: workhub-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
